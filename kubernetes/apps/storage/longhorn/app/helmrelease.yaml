apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: storage # Vorher Namespace erstellen!
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.7.2 # Aktuelle Version prüfen
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    defaultSettings:
      # Da du separate Disks gemountet hast (z.B. /var/mnt/backup-disk-01)
      # kannst du Longhorn sagen, wo es seine Daten ablegen soll
      defaultDataPath: /var/mnt/backup-disk-01
