apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: "0.8.x" # You can pin a specific chart version
      sourceRef:
        kind: HelmRepository
        name: immich
  values:
    # Disable traditional Ingress in favor of Gateway API HTTPRoute
    ingress:
      main:
        enabled: false

    # Example values (adjust to your persistence needs)
    immich:
      persistence:
        library:
          existingClaim: "" # Leave empty to auto-provision, or add your PVC name
          size: 50Gi
