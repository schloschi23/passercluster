apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: "0.8.x"
      sourceRef:
        kind: HelmRepository
        name: immich

  values:
  values:
    # 2. Update your env block to pull the secret:
    env:
      DB_HOSTNAME: "immich-postgresql"
      DB_USERNAME: "immich"
      DB_DATABASE_NAME: "immich"
      REDIS_HOSTNAME: "immich-redis-master"
      IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
      # Add the password back, securely referencing the secret:
      DB_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: immich-db-secret
            key: DB_PASSWORD

    ingress:
      main:
        enabled: false

    immich:
      podSecurityContext:
        fsGroup: 1000
      persistence:
        library:
          existingClaim: "immich-library-pvc"
