apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: "0.8.x" # You can pin a specific chart version
      sourceRef:
        kind: HelmRepository
        name: immich
  values:
    env:
      DB_HOSTNAME: "immich-postgresql"
      DB_USERNAME: "immich"
      DB_PASSWORD: "immich-secret"
      DB_DATABASE_NAME: "immich"
      REDIS_HOSTNAME: "immich-redis-master"

    ingress:
      main:
        enabled: false

    immich:
      persistence:
        library:
          existingClaim: "immich-library-pvc"
