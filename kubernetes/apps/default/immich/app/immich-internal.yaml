apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-internal
spec:
  parentRefs:
    - name: envoy-internal  # <-- Points to internal Gateway
      namespace: network
      sectionName: https
  hostnames:
    - "immich.passer.net"   # <-- Internal Domain
  rules:
    - backendRefs:
        - name: immich-server
          port: 2283
