apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "immich.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: immich-server
          port: 2283
