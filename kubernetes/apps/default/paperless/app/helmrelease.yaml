apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  interval: 1h
  chart:
    spec:
      chart: paperless-ngx
      version: ">=0.24.x" # You can pin to a specific chart version, check for latest
      sourceRef:
        kind: HelmRepository
        name: paperless
  values:
    # Disable default ingress as we are using HTTPRoute
    ingress:
      main:
        enabled: false

    # Link our SOPS secret to automatically generate the initial admin user and pass
    envFrom:
      - secretRef:
          name: paperless-admin-secret

    # Essential Paperless Environment Variables
    env:
      TZ: "UTC" # Change to your timezone (e.g., Europe/Berlin)
      PAPERLESS_URL: "https://paperless.schloschi.com" # Matches your external domain

    # Storage configuration for user data, media, and drop-in consumption

    persistence:
      data:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      media:
        enabled: true
        size: 20Gi
        accessMode: ReadWriteOnce
      consume:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce
      export:
        enabled: true
        size: 5Gi
        accessMode: ReadWriteOnce

# Explicitly override the missing PostgreSQL tags
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/postgresql
        tag: 16.2.0-debian-12-r5
      primary:
        persistence:
          enabled: true
          size: 10Gi

    # Explicitly override the missing Redis tags
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/redis
        tag: 7.2.4-debian-12-r6
