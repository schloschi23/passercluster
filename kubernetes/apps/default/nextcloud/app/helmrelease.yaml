apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: "5.x.x" # You can pin to a specific chart version
      sourceRef:
        kind: HelmRepository
        name: nextcloud
  values:
    # These must be right here, at the top level of values!
    livenessProbe:
      initialDelaySeconds: 300
    readinessProbe:
      initialDelaySeconds: 300

    ingress:
      enabled: false

    nextcloud:
      host: "nextcloud.yourdomain.com"
      # REMOVE username and password here
      existingSecret:
        enabled: true
        secretName: nextcloud-admin-secret
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password



    # Storage for user data
    persistence:
      enabled: true
      existingClaim: ""
      size: 200Gi

    # Update MariaDB block
    mariadb:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/mariadb
      primary:
        persistence:
          enabled: true
          size: 8Gi

    # Update Redis block
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
