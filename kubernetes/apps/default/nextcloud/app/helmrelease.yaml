apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: "5.x.x" # You can pin to a specific chart version
      sourceRef:
        kind: HelmRepository
        name: nextcloud
  values:
    ingress:
      enabled: true
      className: "HTTPRoute" # Adjust to your ingress controller (e.g. gateway api, traefik, or nginx)
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-production" # Assuming you use cert-manager
      path: /
      pathType: Prefix

    # Core Nextcloud configurations
    nextcloud:
      host: "nextcloud.yourdomain.com"
      # REMOVE username and password here
      existingSecret:
        enabled: true
        secretName: nextcloud-admin-secret
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password



    # Storage for user data
    persistence:
      enabled: true
      existingClaim: ""
      size: 1200Gi

    # Update MariaDB block
    mariadb:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/mariadb
        tag: "11.2"
      primary:
        persistence:
          enabled: true
          size: 8Gi

    # Update Redis block
    redis:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/redis
        tag: "7.2"
