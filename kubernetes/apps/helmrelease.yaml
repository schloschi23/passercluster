# kubernetes/apps/storage/longhorn/app/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  values:
    defaultSettings:
      # WICHTIG: Hier gibst du den Mountpoint deiner 4 TB Platte an
      defaultDataPath: /var/mnt/backup-disk-01
      # Erlaube Longhorn, auf Nodes ohne Label zu laufen (für dein kleines Cluster einfacher)
      createDefaultDiskWithNodeLabeled: false
